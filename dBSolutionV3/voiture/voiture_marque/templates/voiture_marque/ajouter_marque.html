{% extends "base.html" %}
{% load i18n static %}

{% block content %}
<div class="max-w-xl mx-auto p-6 bg-white rounded shadow mt-16 mb-16">

    <h1 class="text-2xl font-bold mb-4 text-center flex items-center justify-center">
        <img src="{% static 'icons/voiture-de-course.png' %}" alt="Marque" style="width:60px; height:60px; margin-right:10px;">
        {% trans "Ajouter une Marque" %}
    </h1>



    <!-- Messages -->
    {% if messages %}
        {% for message in messages %}
        <div class="mb-3 px-4 py-2 rounded
            {% if message.tags == 'success' %}
                bg-green-100 text-green-800 border border-green-300
            {% else %}
                bg-red-100 text-red-800 border border-red-300
            {% endif %}">
            {{ message }}
        </div>
        {% endfor %}
    {% endif %}


    <form method="post" id="form-ajouter-marque" class="flex flex-col space-y-4">
        {% csrf_token %}
        <div class="flex flex-col relative">
            <label for="id_marque" class="mb-1 font-medium">{% trans "Marque" %}</label>
            <input type="text" id="id_marque" name="marque"
                   class="border border-gray-300 rounded px-4 py-2 w-full"
                   placeholder="{% trans 'Nom de la marque' %}" autocomplete="on">
            <p id="marque-feedback" class="text-sm mt-1 hidden"></p>
        </div>

        <br>
         <div class="flex gap-3 mt-6">
               <button type="submit"
                        id="btn-ajouter-marque"
                        class="flex-1 bg-blue-700 text-white px-5 py-4 rounded hover:bg-blue-400 font-semibold text-center">
                    {% trans "Enregistrer" %}
                </button>

               <a href="{% url 'voiture_marque:dashboard_voiture' %}"
                   class="flex-1 bg-gray-300 text-black px-5 py-4 rounded hover:bg-gray-400 font-semibold text-center">
                    {% trans "Annuler" %}
                </a>

          </div>
    </form>
</div>
<div class="max-w-xl mx-auto mt-4">
    <a href="{% url 'voiture_marque:dashboard_voiture' %}"
       class="block w-full bg-blue-700 text-white px-5 py-4 rounded hover:bg-blue-400 font-semibold text-center">
        {% trans "Retour au dashboard voitures" %}
    </a>
</div>
<script>
document.addEventListener("DOMContentLoaded", function () {

    const inputMarque = document.getElementById("id_marque");
    const btnAjouter = document.getElementById("btn-ajouter-marque");
    const feedback = document.getElementById("marque-feedback");
    const checkMarqueUrl = "{% url 'voiture_marque:check_marque' %}";

    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== "") {
            const cookies = document.cookie.split(";");
            for (let cookie of cookies) {
                cookie = cookie.trim();
                if (cookie.startsWith(name + "=")) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    const csrftoken = getCookie("csrftoken");

    if (!inputMarque || !btnAjouter || !feedback) return;

    let debounceTimer;

    inputMarque.addEventListener("input", function () {
        clearTimeout(debounceTimer);

        debounceTimer = setTimeout(() => {
            const marque = inputMarque.value.trim();

            if (marque.length === 0) {
                feedback.classList.add("hidden");
                feedback.textContent = "";
                btnAjouter.disabled = false;
                return;
            }

            feedback.textContent = "Vérification…";
            feedback.classList.remove("hidden", "text-red-600", "text-green-600");

            fetch(checkMarqueUrl, {
                method: "POST",
                headers: {
                    "Content-Type": "application/x-www-form-urlencoded",
                    "X-CSRFToken": csrftoken,
                    "Accept": "application/json"
                },
                body: new URLSearchParams({
                    marque: marque
                })
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error("Erreur HTTP " + response.status);
                }
                return response.json();
            })
            .then(data => {
                if (data.exists === true) {
                    feedback.textContent = "❌ Cette marque existe déjà !";
                    feedback.classList.add("text-red-600");
                    feedback.classList.remove("text-green-600");
                    btnAjouter.disabled = true;
                } else {
                    feedback.textContent = "✅ Marque disponible";
                    feedback.classList.add("text-green-600");
                    feedback.classList.remove("text-red-600");
                    btnAjouter.disabled = false;
                }
            })
            .catch(error => {
                console.error("Erreur fetch :", error);
                feedback.textContent = "Erreur lors de la vérification";
                feedback.classList.add("text-red-600");
                feedback.classList.remove("text-green-600");
                btnAjouter.disabled = false;
            });

        }, 300);
    });
});
</script>

{% endblock %}
