{% extends "base.html" %}
{% load i18n static %}

{% block content %}
<div class="max-w-xl mx-auto p-6 bg-white rounded shadow mt-16 mb-16">

    <!-- Header -->
    <h1 class="text-2xl font-bold mb-4 text-center flex items-center justify-center">
        <img src="{% static 'icons/proprietaire(1).png' %}"
             style="width:75px; margin-right:5px;"
             alt="{% trans 'Propriétaire voiture' %}">
        {% trans "Associer un propriétaire à une voiture" %}
    </h1>

    <!-- Messages -->
    {% if messages %}
        {% for message in messages %}
            <div class="mb-3 px-4 py-2 rounded
                {% if message.tags == 'success' %}
                    bg-green-100 text-green-800 border border-green-300
                {% else %}
                    bg-red-100 text-red-800 border border-red-300
                {% endif %}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="post" class="flex flex-col space-y-4">
        {% csrf_token %}

        <!-- Propriétaire (SELECT OBLIGATOIRE) -->
        <div>
            <label for="id_proprietaire">{% trans "Propriétaire" %}</label>
            <select id="id_proprietaire" name="proprietaire"
                    class="border rounded px-4 py-2 w-full">
                <option value="">{% trans "Sélectionner un propriétaire" %}</option>
                {% for p in proprietaires %}
                    <option value="{{ p.id }}">
                        {{ p.prenom }} {{ p.nom }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <!-- Voiture -->
        <div>
            <label for="id_exemplaire">{% trans "Voiture" %}</label>
            <select id="id_exemplaire" name="exemplaire"
                    class="border rounded px-4 py-2 w-full">
                <option value="">{% trans "Sélectionner une voiture" %}</option>
                {% for v in voitures %}
                    <option value="{{ v.id }}">
                        {{ v.immatriculation }}  {{ v.nom_marque }} {{ v.nom_modele }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <!-- Part (%) -->
        <div>
            <label for="id_part">{% trans "Part (%)" %}</label>
            <input type="number" id="id_part" name="part_proprietaire_pourcent"
                   class="border rounded px-4 py-2 w-full"
                   min="0" max="100" value="100">
        </div>

        <!-- Buttons -->
        <div class="flex gap-3 mt-6">
            <button type="submit"
                    class="flex-1 bg-blue-700 text-white px-5 py-4 rounded hover:bg-blue-400 font-semibold text-center">
                {% trans "Enregistrer" %}
            </button>

            <a href="{% url 'proprietaire:proprietaire_voiture_list' %}"
               class="flex-1 bg-gray-300 text-black px-5 py-4 rounded hover:bg-gray-400 font-semibold text-center">
                {% trans "Annuler" %}
            </a>
        </div>

    </form>
</div>


<script>
     function getCookie(name) {
        const cookies = document.cookie ? document.cookie.split(';') : [];
        for (let cookie of cookies) {
            cookie = cookie.trim();
            if (cookie.startsWith(name + '=')) {
                return decodeURIComponent(cookie.slice(name.length + 1));
            }
        }
        return null;
    }
    const csrftoken = getCookie('csrftoken');

</script>
{% endblock %}
