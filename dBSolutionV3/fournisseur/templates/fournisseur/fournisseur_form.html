{% extends "base.html" %}
{% load i18n static %}

{% block content %}
<br>

<div class="max-w-xl mx-auto p-6 bg-white rounded shadow mt-16 mb-16">

    <!-- HEADER -->
    <h1 class="text-2xl font-bold mb-4 text-center flex items-center justify-center">
        <img src="{% static 'icons/fournisseur.png' %}"
             style="width:75px; margin-right:5px;"
             alt="Fournisseur">
        {% trans "Créer un Fournisseur" %}
    </h1>

    <!-- MESSAGES -->
    {% if messages %}
        {% for message in messages %}
            <div class="mb-3 px-4 py-2 rounded
                {% if message.tags == 'success' %}
                    bg-green-100 text-green-800 border border-green-300
                {% else %}
                    bg-red-100 text-red-800 border border-red-300
                {% endif %}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <!-- FORM -->
    <form method="post" class="flex flex-col space-y-4">
        {% csrf_token %}

        <!-- FOURNISSEUR -->
        <div class="flex flex-col relative">
            <label for="id_fournisseur" class="mb-1 font-medium">
                {% trans "Fournisseur" %}
            </label>

            <input type="text"
                   id="id_fournisseur"
                   name="fournisseur"
                   value="{{ request.POST.fournisseur|default:'' }}"
                   class="border rounded px-4 py-2 w-full"
                   placeholder="{% trans 'Nom du fournisseur' %}"
                   autocomplete="off">

            <!-- FEEDBACK -->
            <p id="feedback" class="text-sm mt-1 hidden"></p>
        </div>

        <!-- TVA -->
        <div>
            <label>{% trans "Numéro de TVA" %}</label>
            <input type="text" name="numero_tva"
                   value="{{ request.POST.numero_tva|default:'' }}"
                   class="border rounded px-4 py-2 w-full"
                   placeholder="BE1234567891">
        </div>

        <!-- PEPPOL -->
        <div>
            <label>{% trans "Numéro Peppol" %}</label>
            <input type="text" name="peppol_id"
                   value="{{ request.POST.peppol_id|default:'' }}"
                   class="border rounded px-4 py-2 w-full"
                   placeholder="0208:0630675588">
        </div>

        <!-- EMAIL -->
        <div>
            <label>{% trans "Email" %}</label>
            <input type="email" name="email"
                   value="{{ request.POST.email|default:'' }}"
                   class="border rounded px-4 py-2 w-full">
        </div>

        <!-- TELEPHONE -->
        <div>
            <label>{% trans "Téléphone" %}</label>
            <input type="text" name="gsm"
                   value="{{ request.POST.gsm|default:'' }}"
                   class="border rounded px-4 py-2 w-full">
        </div>

        <!-- BOUTONS -->
        <div class="flex gap-3 mt-6">

            <button type="submit"
                    id="btnAjouter"
                    class="flex-1 bg-blue-700 text-white px-5 py-4 rounded hover:bg-blue-400 font-semibold text-center">
                {% trans "Enregistrer" %}
            </button>

            <a href="{% url 'fournisseur:fournisseur_list' %}"
               class="flex-1 bg-gray-300 text-black px-5 py-4 rounded hover:bg-gray-400 font-semibold text-center">
                {% trans "Annuler" %}
            </a>

        </div>

    </form>
</div>

<!-- ========================= -->
<!-- JS VALIDATION FOURNISSEUR -->
<!-- ========================= -->
<script>
document.addEventListener('DOMContentLoaded', () => {

    function getCookie(name) {
        let cookieValue = null;
        document.cookie.split(';').forEach(c => {
            c = c.trim();
            if (c.startsWith(name + '=')) {
                cookieValue = decodeURIComponent(c.slice(name.length + 1));
            }
        });
        return cookieValue;
    }

    const csrftoken = getCookie('csrftoken');

    const inputFournisseur = document.getElementById('id_fournisseur');
    const feedback = document.getElementById('feedback');
    const btnAjouter = document.getElementById('btnAjouter');

    const checkUrl = "{% url 'fournisseur:check_nom_fournisseur' %}";

    if (!inputFournisseur || !feedback || !btnAjouter) return;

    let debounceTimer = null;

    inputFournisseur.addEventListener('input', function () {

        clearTimeout(debounceTimer);

        debounceTimer = setTimeout(() => {

            const nom = this.value.trim();

            if (!nom) {
                feedback.classList.add('hidden');
                btnAjouter.disabled = false;
                return;
            }

            feedback.textContent = "{% trans 'Vérification…' %}";
            feedback.classList.remove('hidden', 'text-red-600', 'text-green-600');

            fetch(checkUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                    'X-CSRFToken': csrftoken
                },
                body: new URLSearchParams({
                    nom_marque: nom
                })
            })
            .then(res => res.json())
            .then(data => {

                feedback.classList.remove('text-red-600', 'text-green-600');

                if (data.exists) {
                    feedback.textContent = "❌ {% trans 'Ce fournisseur existe déjà !' %}";
                    feedback.classList.add('text-red-600');
                    btnAjouter.disabled = true;
                } else {
                    feedback.textContent = "✅ {% trans 'Fournisseur disponible' %}";
                    feedback.classList.add('text-green-600');
                    btnAjouter.disabled = false;
                }

            })
            .catch(err => {
                console.error(err);
                feedback.textContent = "{% trans 'Erreur lors de la vérification' %}";
                feedback.classList.add('text-red-600');
                btnAjouter.disabled = false;
            });

        }, 400);

    });

});
</script>

{% endblock %}
